<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>招柴桔 · 对账单</title></head><body class="zcj">
<style>
:root{
  --bg:#FAF6F0; --card:#FFFFFF; --ink:#241F1A; --muted:#8B8177;
  --line:#EBE3D8; --accent:#E4711E; --accent-soft:#FBEADA;
  --good:#3E8E6B; --good-soft:#E4F0EA; --warn:#B5791F; --warn-soft:#F8EEDA;
  --radius:16px; --shadow:0 1px 2px rgba(60,40,20,.05),0 8px 28px rgba(60,40,20,.06);
}
@media (prefers-color-scheme:dark){:root{
  --bg:#181410; --card:#221C17; --ink:#F0EAE1; --muted:#9C9186;
  --line:#332B23; --accent:#F0904A; --accent-soft:#3A2A1B;
  --good:#5FB78D; --good-soft:#1F2E27; --warn:#D9A64B; --warn-soft:#2E2519;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.35);
}}
:root[data-theme="light"]{
  --bg:#FAF6F0; --card:#FFFFFF; --ink:#241F1A; --muted:#8B8177;
  --line:#EBE3D8; --accent:#E4711E; --accent-soft:#FBEADA;
  --good:#3E8E6B; --good-soft:#E4F0EA; --warn:#B5791F; --warn-soft:#F8EEDA;
  --shadow:0 1px 2px rgba(60,40,20,.05),0 8px 28px rgba(60,40,20,.06);
}
:root[data-theme="dark"]{
  --bg:#181410; --card:#221C17; --ink:#F0EAE1; --muted:#9C9186;
  --line:#332B23; --accent:#F0904A; --accent-soft:#3A2A1B;
  --good:#5FB78D; --good-soft:#1F2E27; --warn:#D9A64B; --warn-soft:#2E2519;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
.zcj{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--ink);min-height:100vh;line-height:1.5;
  -webkit-font-smoothing:antialiased;font-variant-numeric:tabular-nums;
  padding:24px 16px 56px;}
.zcj *{font-variant-numeric:tabular-nums}
.wrap{max-width:560px;margin:0 auto;display:flex;flex-direction:column;gap:18px}
.num{font-feature-settings:"tnum";letter-spacing:-.01em}
/* 口令门 */
.gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px;z-index:20}
.gate.hidden{display:none}
.gate-card{width:100%;max-width:340px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:32px 26px;text-align:center}
.gate-mark{width:44px;height:44px;border-radius:12px;background:var(--accent-soft);color:var(--accent);
  display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:22px}
.gate h1{font-size:19px;margin:0 0 4px;font-weight:700}
.gate p{color:var(--muted);font-size:13px;margin:0 0 22px}
.gate input{width:100%;padding:13px 15px;border:1px solid var(--line);border-radius:11px;background:var(--bg);
  color:var(--ink);font-size:16px;text-align:center;letter-spacing:.05em;outline:none}
.gate input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.gate button{width:100%;margin-top:12px;padding:13px;border:0;border-radius:11px;background:var(--accent);
  color:#fff;font-size:15px;font-weight:600;cursor:pointer}
.gate button:active{transform:translateY(1px)}
.gate .err{color:#C0472F;font-size:13px;margin-top:12px;min-height:18px}
@media(prefers-color-scheme:dark){.gate button{color:#1a1410}}
:root[data-theme="dark"] .gate button{color:#1a1410}
/* 头部 */
.head{display:flex;align-items:center;gap:10px;padding:2px 2px 0}
.badge{width:30px;height:30px;border-radius:9px;background:var(--accent-soft);color:var(--accent);
  display:flex;align-items:center;justify-content:center;font-size:16px}
.head .t{font-weight:700;font-size:15px}
.head .s{color:var(--muted);font-size:12px;margin-left:auto}
/* 英雄卡 */
.hero{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:26px 24px 22px}
.hero .k{color:var(--muted);font-size:13px;letter-spacing:.02em}
.hero .v{font-size:44px;font-weight:800;letter-spacing:-.02em;margin:6px 0 2px;line-height:1.05}
.hero .v small{font-size:22px;font-weight:700;color:var(--muted);margin-right:2px}
.hero .stat{display:flex;gap:22px;margin-top:18px;padding-top:16px;border-top:1px solid var(--line)}
.hero .stat div{display:flex;flex-direction:column;gap:3px}
.hero .stat .sk{color:var(--muted);font-size:12px}
.hero .stat .sv{font-size:17px;font-weight:600}
/* 区块标题 */
.sec-h{display:flex;align-items:baseline;gap:8px;margin:6px 2px 0}
.sec-h h2{font-size:14px;font-weight:700;margin:0;letter-spacing:.02em}
.sec-h span{color:var(--muted);font-size:12px}
/* 月度清单 */
.months{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.mrow{display:grid;grid-template-columns:1fr auto;gap:4px 12px;padding:14px 18px;border-top:1px solid var(--line);align-items:center}
.mrow:first-child{border-top:0}
.mrow .ml{display:flex;align-items:center;gap:9px}
.mrow .mlabel{font-weight:600;font-size:14px}
.chip{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;white-space:nowrap}
.chip.ok{background:var(--good-soft);color:var(--good)}
.chip.due{background:var(--warn-soft);color:var(--warn)}
.mrow .mbill{grid-row:2;color:var(--muted);font-size:12px}
.mrow .mbal{grid-row:span 2;justify-self:end;text-align:right}
.mrow .mbal .bv{font-size:16px;font-weight:700}
.mrow .mbal .bk{font-size:11px;color:var(--muted)}
.bv.pos{color:var(--ink)} .bv.zero{color:var(--good)}
/* 折叠 */
details{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
details>summary{list-style:none;cursor:pointer;padding:15px 18px;display:flex;align-items:center;gap:8px;font-weight:600;font-size:14px}
details>summary::-webkit-details-marker{display:none}
details>summary .cnt{color:var(--muted);font-weight:400;font-size:12px}
details>summary .arw{margin-left:auto;color:var(--muted);transition:transform .2s}
details[open]>summary .arw{transform:rotate(90deg)}
.mgroup{border-top:1px solid var(--line);padding:8px 0 2px}
.mgroup .gt{font-size:12px;color:var(--muted);padding:8px 18px 4px;font-weight:600}
.line{display:grid;grid-template-columns:1fr auto;gap:2px 10px;padding:8px 18px}
.line .ln{font-size:13px}
.line .lm{grid-row:2;color:var(--muted);font-size:11px}
.line .la{justify-self:end;grid-row:span 2;align-self:center;font-weight:600;font-size:14px}
.tag{font-size:10px;padding:1px 6px;border-radius:5px;background:var(--accent-soft);color:var(--accent);margin-left:6px;vertical-align:middle}
.tag.df{background:var(--good-soft);color:var(--good)}
.pay{display:grid;grid-template-columns:1fr auto;gap:2px 10px;padding:11px 18px;border-top:1px solid var(--line)}
.pay .pn{font-size:13px} .pay .pm{grid-row:2;color:var(--muted);font-size:11px}
.pay .pa{justify-self:end;grid-row:span 2;align-self:center;font-weight:700;font-size:15px;color:var(--good)}
.foot{text-align:center;color:var(--muted);font-size:12px;padding:8px 0 0;line-height:1.7}
.warn{background:var(--warn-soft);color:var(--warn);border-radius:12px;padding:10px 14px;font-size:12px}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

<div class="gate" id="gate">
  <div class="gate-card">
    <div class="gate-mark">🔒</div>
    <h1>招柴桔 · 对账单</h1>
    <p>请输入查看口令</p>
    <input id="pass" type="password" inputmode="text" autocomplete="off" placeholder="口令" />
    <button id="go">查看对账单</button>
    <div class="err" id="err"></div>
  </div>
</div>

<script>
(function(){
  var enc = JSON.parse(document.getElementById('enc').textContent);
  var gate=document.getElementById('gate'), app=document.getElementById('app'),
      pass=document.getElementById('pass'), err=document.getElementById('err'), go=document.getElementById('go');
  function b64(s){var b=atob(s),a=new Uint8Array(b.length);for(var i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a;}
  function yuan(n){var neg=n<0;n=Math.abs(n);
    var s=(Math.round(n*100)/100).toLocaleString('zh-CN',{minimumFractionDigits:0,maximumFractionDigits:2});
    return (neg?'-':'')+s;}
  async function unlock(){
    err.textContent='';
    var pw=pass.value.trim(); if(!pw){err.textContent='请输入口令';return;}
    go.disabled=true; go.textContent='解锁中…';
    try{
      var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
      var key=await crypto.subtle.deriveKey(
        {name:'PBKDF2',salt:b64(enc.salt),iterations:enc.iters,hash:'SHA-256'},
        km,{name:'AES-GCM',length:256},false,['decrypt']);
      var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(enc.iv)},key,b64(enc.ct));
      var data=JSON.parse(new TextDecoder().decode(pt));
      render(data);
      gate.classList.add('hidden'); app.style.display='flex';
    }catch(e){
      go.disabled=false; go.textContent='查看对账单';
      err.textContent='口令不对，再试一次'; pass.select();
    }
  }
  go.addEventListener('click',unlock);
  pass.addEventListener('keydown',function(e){if(e.key==='Enter')unlock();});

  function el(h){var d=document.createElement('div');d.innerHTML=h.trim();return d.firstChild;}
  function esc(s){return String(s).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}

  function render(d){
    var s=d.summary;
    app.appendChild(el(
      '<div class="head"><div class="badge">🐕</div><div class="t">'+esc(d.shop)+' · 对账单</div>'+
      '<div class="s">更新于 '+esc(d.updated)+'</div></div>'));
    app.appendChild(el(
      '<div class="hero"><div class="k">当前欠款</div>'+
      '<div class="v num"><small>¥</small>'+yuan(s.owed)+'</div>'+
      '<div class="stat"><div><span class="sk">累计消费</span><span class="sv num">¥'+yuan(s.billed)+'</span></div>'+
      '<div><span class="sk">已付</span><span class="sv num">¥'+yuan(s.paid)+'</span></div>'+
      '<div><span class="sk">订单</span><span class="sv num">'+s.orderCount+' 笔</span></div></div></div>'));
    if(d.warnings){d.warnings.forEach(function(w){app.appendChild(el('<div class="warn">⚠ '+esc(w)+'</div>'));});}

    app.appendChild(el('<div class="sec-h"><h2>按月明细</h2><span>共 '+s.monthCount+' 个月 · 含累计结欠</span></div>'));
    var mc=el('<div class="months"></div>');
    d.months.forEach(function(m){
      var chip=m.settled?'<span class="chip ok">结清</span>':'<span class="chip due">待结</span>';
      var balcls=m.cumulative<=0?'zero':'pos';
      mc.appendChild(el(
        '<div class="mrow"><div class="ml"><span class="mlabel">'+esc(m.label)+'</span>'+chip+'</div>'+
        '<div class="mbill num">账单 ¥'+yuan(m.bill)+' · 已付 ¥'+yuan(m.paid)+'</div>'+
        '<div class="mbal"><div class="bv num '+balcls+'">¥'+yuan(m.cumulative)+'</div><div class="bk">累计结欠</div></div></div>'));
    });
    app.appendChild(mc);

    // 订单明细（按月分组，倒序）
    var det=el('<details><summary>每笔订单 <span class="cnt">'+s.orderCount+' 笔</span><span class="arw">›</span></summary></details>');
    d.months.slice().reverse().forEach(function(m){
      if(!m.orders.length)return;
      var g=el('<div class="mgroup"><div class="gt">'+esc(m.label)+'</div></div>');
      m.orders.slice().reverse().forEach(function(o){
        var tag=o.channel==='代发'?'<span class="tag df">代发</span>':'<span class="tag">批发</span>';
        g.appendChild(el(
          '<div class="line"><div class="ln">'+esc(o.sku)+tag+'</div>'+
          '<div class="lm num">'+esc(o.date)+' · ×'+o.qty+'</div>'+
          '<div class="la num">¥'+yuan(o.amount)+'</div></div>'));
      });
      det.appendChild(g);
    });
    app.appendChild(det);

    // 付款记录
    var pd=el('<details><summary>付款记录 <span class="cnt">'+d.payments.length+' 笔 · 共 ¥'+yuan(s.paid)+'</span><span class="arw">›</span></summary></details>');
    d.payments.slice().reverse().forEach(function(p){
      pd.appendChild(el(
        '<div class="pay"><div class="pn">'+esc(p['for'])+' 货款</div>'+
        '<div class="pm num">'+esc(p.date||'')+' · '+esc(p.method)+'</div>'+
        '<div class="pa num">¥'+yuan(p.amount)+'</div></div>'));
    });
    app.appendChild(pd);

    app.appendChild(el('<div class="foot">它小灶 × 招柴桔<br>数字自动核算 · 仅供对账</div>'));
  }
})();
</script>
</body></html>
